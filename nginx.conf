server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    # mp4/webm/webp are already compressed — do not re-gzip them.

    # hashed JS/CSS from the Vite build: safe to cache "forever"
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # media/fonts: long cache, filenames aren't hashed so keep it moderate
    location ~* \.(?:mp4|webm|woff2|webp|jpg|jpeg|png|svg)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
